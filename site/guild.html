<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guilda</title>
    <link rel="stylesheet" href="guildstyle.css">
</head>
<body>
    <div class="glass-wrapper">
        <header class="aero-header">
            <img src="misericordia.jpg" class="logo">
            <div class="title-text">
                <h1>O Arquivo Frutiger Aero</h1>
                <p>Aproveite papéis de parede, músicas e muito mais!</p>
            </div>
        </header>
    
        <div class="main-layout">
            <aside class="aero-sidebar">
                <div class="category">Conteúdo principal</div>
                <nav>
                    <a href="#" class="nav-item active">Introdução</a>
                    <a href="#" class="nav-item">Recursos</a>
                    <a href="#" class="nav-item">História</a>
                </nav>
            </aside>
    
            <main class="aero-content">
                <div class="content-box">
                    <div class="box-header">Arquivo de Papéis de Parede</div>
                    <div class="box-inner">
                        <img src="misericordia.jpg" class="banner">
                        <p class="aviso">Aviso: as imagens são protegidas...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
